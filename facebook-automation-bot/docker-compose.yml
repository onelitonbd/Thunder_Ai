version: '3.8'

services:
  facebook-bot:
    build: .
    container_name: facebook-automation-bot
    restart: always
    env_file:
      - .env
    environment:
      - TZ=UTC
    volumes:
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
